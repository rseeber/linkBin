<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/editor.css">
    <!-- Dependency: Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Editor Script -->
    <!-- 
    <script src="/src/markdown-wysiwyg/dist/editor.js"></script>
    -->
    <script type="module" src="/src/main.jsx"></script> 
    <title>Visual Editor</title>
</head>
<body>

<div id="box">


    <div id="floating_editor">
        <div id="_row_1">
            <input type="button" onclick="publishSite()" value="Publish Site" id="publish_site">
            <h1 id="app_title">WebHost Editor</h1>
        </div>
        <div id="_row_2">
            <hr>
            <h2 style="font-family: monospace;"><span id="site_title">[site]</span>/<span id="page_title"></span></h2>
            <form id="template_form">
                <label for="template_selector">Template: </label>
                <select name="template" id="template_selector">
                <!-- Insert options via JS here -->
                </select>
                <input type="button" onclick="setTemplate()" value="Select"><br>
            </form>
            <h2 id="page_title"></h2>
            <form id="title_form">
                <label for="title">Title: </label>
                <input type="text" id="title">
                <input type="button" onclick="setTitle()" value="Select">
            </form>
        </div>
        <div id="_row_3">
            <label for="default_template">Default Template: </label>
            <select id="default_template">
                <!-- Insert options via JS here -->
            </select>
            <input type="button" onclick="setDefaultTemplate()" value="Select">
            <br>
            <div id="file_explorer">
                <ul id="file_explorer_list">
                </ul>
                <div id="file_explorer_buttons">
                    <button onclick="createChildPage()">+ Child Page</button>
                    <button onclick="createSiblingPage()">+ Sibling Page</button>
                    <button onclick="deletePage()" id="delete_button">Delete Page</button>
                </div>
            </div>
        </div>



        <form id="meta_form">
            <input type="hidden" id="site" value="exampleSite">
            <input type="hidden" id="frontMatter" value="">
            <!-- 
                <label for="site">Site Name:</label><br>
                <input type="button" onclick="setSite()" value="Submit">
        <div class="site_editor">
            <div id="editor_window">
                <div id="MDXEditorWindow"></div>
            </div>
        </div>
            -->
        </form>
    </div>

    <div id="webpage">
    </div>
    
</div>


</body>
</html>
